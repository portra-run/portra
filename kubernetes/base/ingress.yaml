apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: portra
  namespace: portra-system
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  rules:
  - host: portra.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: portra
            port:
              number: 80
