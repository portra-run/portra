apiVersion: v1
kind: ServiceAccount
metadata:
  name: portra
  namespace: portra-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: portra-admin
rules:
- apiGroups: ["*"]
  resources: ["*"]
  verbs: ["*"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: portra-admin-binding
subjects:
- kind: ServiceAccount
  name: portra
  namespace: portra-system
roleRef:
  kind: ClusterRole
  name: portra-admin
  apiGroup: rbac.authorization.k8s.io
